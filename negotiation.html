<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026 단가 협상 대시보드</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; }
body {
  font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif;
  background: #f5f6fa; color: #2d3436;
  display: flex; flex-direction: column; height: 100vh; overflow: hidden;
}

/* Header */
.header {
  background: linear-gradient(135deg, #2d3436, #636e72);
  color: white; padding: 14px 32px;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.header h1 { font-size: 20px; font-weight: 700; }
.header .meeting { font-size: 12px; opacity: 0.85; text-align: right; }
.header .meeting div { margin-top: 2px; }

/* Summary Cards */
.summary {
  display: flex; gap: 12px; padding: 12px 32px; flex-wrap: wrap; flex-shrink: 0;
}
.card {
  background: white; border-radius: 8px; padding: 10px 16px;
  flex: 1; min-width: 140px; box-shadow: 0 2px 6px rgba(0,0,0,0.06);
}
.card .label { font-size: 11px; color: #636e72; margin-bottom: 2px; }
.card .value { font-size: 20px; font-weight: 700; }
.card .sub { font-size: 10px; color: #b2bec3; margin-top: 1px; }
.card.danger .value { color: #d63031; }
.card.primary .value { color: #0984e3; }
.card.purple .value { color: #6c5ce7; }

/* Tabs */
.tabs {
  display: flex; gap: 0; padding: 0 32px; border-bottom: 2px solid #dfe6e9;
  background: white; flex-shrink: 0;
}
.tab {
  padding: 10px 20px; cursor: pointer; font-size: 13px; font-weight: 500;
  border: none; background: none; color: #636e72;
  border-bottom: 3px solid transparent; margin-bottom: -2px;
  transition: all 0.2s;
}
.tab:hover { color: #2d3436; background: #f8f9fa; }
.tab.active { color: #0984e3; border-bottom-color: #0984e3; font-weight: 700; background: #ebf5fb; }

/* Preset bar */
.preset-bar {
  display: flex; gap: 8px; padding: 8px 32px; background: white;
  border-bottom: 1px solid #dfe6e9; align-items: center; flex-shrink: 0;
}
.preset-bar label { font-size: 12px; color: #636e72; margin-right: 8px; }
.preset-btn {
  padding: 5px 14px; border: 1px solid #dfe6e9; border-radius: 6px;
  background: white; cursor: pointer; font-size: 12px; color: #2d3436;
  transition: all 0.15s;
}
.preset-btn:hover { background: #f0f0f0; }
.preset-btn.active { background: #0984e3; color: white; border-color: #0984e3; }

/* Table area — fills remaining space, scrolls */
.table-wrap {
  flex: 1; overflow: auto; padding: 0 32px;
}
table {
  width: 100%; border-collapse: separate; border-spacing: 0;
  background: white; font-size: 13px;
}

/* Sticky header */
thead th {
  position: sticky; top: 0; z-index: 10;
  background: #2d3436; color: white; padding: 10px 12px;
  text-align: center; font-weight: 600; font-size: 12px;
  white-space: nowrap; border-bottom: 2px solid #b2bec3;
}
thead th.proposed { background: #6c5ce7; }
thead th.counter { background: #00b894; }
thead th.final { background: #e17055; }
thead th.neg { background: #d63031; }

td {
  padding: 8px 12px; text-align: center; border-bottom: 1px solid #f0f0f0;
  white-space: nowrap;
}
tbody tr:hover td { background: #f8f9fa; }
tbody tr:nth-child(even) td { background: #fafbfc; }
tbody tr:nth-child(even):hover td { background: #f0f2f5; }

td.driver { text-align: left; max-width: 80px; overflow: hidden; text-overflow: ellipsis; }
td.route { font-weight: 600; font-family: 'Consolas', monospace; }
td.num { font-family: 'Consolas', monospace; }
td.neg { color: #d63031; }
td.proposed { color: #6c5ce7; font-weight: 700; }

/* Editable inputs */
.price-input {
  width: 70px; text-align: center; border: 1px solid #dfe6e9;
  border-radius: 4px; padding: 4px 2px; font-size: 13px;
  font-family: 'Consolas', monospace; background: #f8fff8;
}
.price-input:focus { outline: none; border-color: #00b894; box-shadow: 0 0 0 2px rgba(0,184,148,0.2); }
.price-input.final { background: #fff5f0; }
.price-input.final:focus { border-color: #e17055; box-shadow: 0 0 0 2px rgba(225,112,85,0.2); }

.stepper {
  display: inline-flex; flex-direction: column; margin-left: 2px; vertical-align: middle;
}
.stepper button {
  width: 18px; height: 14px; border: 1px solid #dfe6e9; background: white;
  cursor: pointer; font-size: 8px; line-height: 1; display: flex;
  align-items: center; justify-content: center; padding: 0;
}
.stepper button:hover { background: #e8f8f5; }
.stepper button:first-child { border-radius: 3px 3px 0 0; }
.stepper button:last-child { border-radius: 0 0 3px 3px; border-top: none; }

/* Camp separator */
tr.camp-header td {
  background: #f0f2f5; font-weight: 700; text-align: left;
  padding: 8px 12px; color: #2d3436; font-size: 13px;
  border-bottom: 2px solid #dfe6e9;
}

/* Subtotal rows (camp-level) */
tr.subtotal-row td {
  background: #edf2f7; font-weight: 600; font-size: 12px;
}
tr.subtotal-row.sum-row td { border-bottom: none; padding-top: 6px; padding-bottom: 2px; }
tr.subtotal-row.avg-row td { padding-top: 2px; padding-bottom: 8px; border-bottom: 2px solid #a0aec0; }
tr.subtotal-row .subtotal-label { text-align: left; font-size: 12px; color: #4a5568; padding-left: 16px; }
tr.subtotal-row:hover td { background: #edf2f7; }

/* Grand total rows */
tr.grand-total-row td {
  background: #2d3436; color: white; font-weight: 700; font-size: 13px;
  font-family: 'Consolas', monospace;
}
tr.grand-total-row.sum-row td { border-bottom: none; padding-top: 10px; padding-bottom: 2px; }
tr.grand-total-row.avg-row td { padding-top: 2px; padding-bottom: 10px; }
tr.grand-total-row .subtotal-label { text-align: left; color: #dfe6e9; font-family: 'Malgun Gothic', sans-serif; padding-left: 16px; }
tr.grand-total-row .num { color: white; }
tr.grand-total-row .proposed { color: #a29bfe; }
tr.grand-total-row .neg { color: #fab1a0; }
tr.grand-total-row:hover td { background: #2d3436; }
table.hide-counter .counter-col { display: none; }

/* Footer */
.footer {
  flex-shrink: 0; padding: 6px 32px; text-align: center; font-size: 10px; color: #b2bec3;
  background: #f5f6fa;
}
</style>

function fmt(n) {
  if (n == null) return '-';
  return Number(n).toLocaleString();
}
function fmtSign(n) {
  if (n == null) return '-';
  return (n > 0 ? '+' : '') + Number(n).toLocaleString();
}
function fmtPct(n) {
  if (n == null) return '-';

function renderSummary() {

  const adjPcts = filtered.filter(d => d.adj_pct != null).map(d => d.adj_pct);

  const propDiffs = filtered.filter(d => d.prop_diff != null).map(d => d.prop_diff);
  const avgPropDiff = propDiffs.length ? Math.trunc(propDiffs.reduce((a,b) => a+b, 0) / propDiffs.length) : '-';

  const counterDiffs = filtered.filter(d => d.p2025 != null).map(d => {

  const sF = items.reduce((s,d) => s + (finalPrices[routeKey(d)] || 0), 0);
  const a2024 = Math.trunc(s2024 / n);
  const a2025 = Math.trunc(s2025 / n);
  const aP = Math.trunc(sP / n);
  const aC = Math.trunc(sC / n);
  const aF = Math.trunc(sF / n);
  const adjA = items.filter(d => d.adj_amount != null).map(d => d.adj_amount);
  const aAdj = adjA.length ? Math.trunc(adjA.reduce((a,b)=>a+b,0)/adjA.length) : null;
  const adjP = items.filter(d => d.adj_pct != null).map(d => d.adj_pct);
  const aAdjP = adjP.length ? (adjP.reduce((a,b)=>a+b,0)/adjP.length) : null;
  const pdA = items.filter(d => d.prop_diff != null).map(d => d.prop_diff);
  const aPD = pdA.length ? Math.trunc(pdA.reduce((a,b)=>a+b,0)/pdA.length) : null;
  const cdA = items.filter(d => d.p2025 != null).map(d => counterPrices[routeKey(d)] - d.p2025);
  const aCD = cdA.length ? Math.trunc(cdA.reduce((a,b)=>a+b,0)/cdA.length) : null;
  const fdA = items.filter(d => d.p2025 != null).map(d => finalPrices[routeKey(d)] - d.p2025);
  const aFD = fdA.length ? Math.trunc(fdA.reduce((a,b)=>a+b,0)/fdA.length) : null;
  // 합계행용 diff 계산
  const sAdj = s2025 - s2024;
  const sAdjP = s2024 !== 0 ? ((s2025 - s2024) / s2024 * 100) : null;
  const sPDsum = sP - s2025;
  const sCDsum = sC - s2025;
  const sFDsum = sF - s2025;

  let h = '';
  h += `<tr class="${cls} sum-row">
    <td colspan="4" class="subtotal-label">${label} 합계 (${n}개)</td>
    <td class="num" id="sub_${cid}_s24">${fmt(s2024)}</td>
    <td class="num neg" id="sub_${cid}_sAdj">${fmtSign(sAdj)}</td>
    <td class="num neg" id="sub_${cid}_sAdjP">${sAdjP != null ? fmtPct(sAdjP) : '-'}</td>
    <td class="num" id="sub_${cid}_s25">${fmt(s2025)}</td>
    <td class="num proposed" id="sub_${cid}_sP">${fmt(sP)}</td>
    <td class="num neg" id="sub_${cid}_sPD">${fmtSign(sPDsum)}</td>
    <td class="num counter-col" id="sub_${cid}_sC">${fmt(sC)}</td>
    <td class="num counter-col" id="sub_${cid}_sCDiff" style="color:${sCDsum >= 0 ? '#00b894' : '#d63031'}">${fmtSign(sCDsum)}</td>
    <td class="num" id="sub_${cid}_sF">${fmt(sF)}</td>
    <td class="num" id="sub_${cid}_sFDiff" style="color:${sFDsum >= 0 ? '#00b894' : '#d63031'}">${fmtSign(sFDsum)}</td>
  </tr>`;
  h += `<tr class="${cls} avg-row">
    <td colspan="4" class="subtotal-label">${label} 평균</td>
    <td class="num" id="sub_${cid}_a24">${fmt(a2024)}</td>
    <td class="num neg" id="sub_${cid}_aAdj">${aAdj != null ? fmtSign(aAdj) : '-'}</td>
    <td class="num neg" id="sub_${cid}_aAdjP">${aAdjP != null ? fmtPct(aAdjP) : '-'}</td>
    <td class="num" id="sub_${cid}_a25">${fmt(a2025)}</td>
    <td class="num proposed" id="sub_${cid}_aP">${fmt(aP)}</td>
    <td class="num neg" id="sub_${cid}_aPD">${aPD != null ? fmtSign(aPD) : '-'}</td>
    <td class="num counter-col" id="sub_${cid}_aC">${fmt(aC)}</td>
    <td class="num counter-col" id="sub_${cid}_aCD" style="color:${aCD != null && aCD >= 0 ? '#00b894' : '#d63031'}">${aCD != null ? fmtSign(aCD) : '-'}</td>
    <td class="num" id="sub_${cid}_aF">${fmt(aF)}</td>
    <td class="num" id="sub_${cid}_aFD" style="color:${aFD != null && aFD >= 0 ? '#00b894' : '#d63031'}">${aFD != null ? fmtSign(aFD) : '-'}</td>
  </tr>`;
  return h;
}

function renderTable() {
  const filtered = getFiltered();
  const multiCamp = selectedCamps.size > 1;

  // 캠프별 그룹핑
  const campGroups = [];
  const campMap = {};
  filtered.forEach(d => {
    if (!campMap[d.camp]) { campMap[d.camp] = []; campGroups.push(d.camp); }
    campMap[d.camp].push(d);
  });

  let rows = '';
  campGroups.forEach(camp => {
    const group = campMap[camp];
    const cid = campId(camp);

    // 캠프 헤더
    if (multiCamp) {
      rows += `<tr class="camp-header"><td colspan="14">${camp} (${group.length}개 라우트)</td></tr>`;
    }

    let idx = 0;
    group.forEach(d => {
      const k = routeKey(d);
      const cp = counterPrices[k];
      const fp = finalPrices[k];
      idx++;

      const counterDiff = d.p2025 != null ? cp - d.p2025 : null;
      const finalDiff = d.p2025 != null ? fp - d.p2025 : null;

      rows += `<tr>
        <td>${idx}</td>
        <td class="route">${d.route}</td>
        <td>${d.type}</td>
        <td class="driver">${d.driver || '-'}</td>
        <td class="num">${fmt(d.p2024)}</td>
        <td class="num neg">${fmtSign(d.adj_amount)}</td>
        <td class="num neg">${fmtPct(d.adj_pct)}</td>
        <td class="num">${fmt(d.p2025)}</td>
        <td class="num proposed">${fmt(d.p2026_proposed)}</td>
        <td class="num neg">${fmtSign(d.prop_diff)}</td>
        <td class="counter-col">
          <input type="number" class="price-input" value="${cp}" step="10"
                 data-key="${k}" onchange="onCounterChange(this)"
                 oninput="onCounterChange(this)">
          <span class="stepper">
            <button onclick="stepCounter('${k}', 10)">&#9650;</button>
            <button onclick="stepCounter('${k}', -10)">&#9660;</button>
          </span>
        </td>
        <td class="num counter-col" id="cd_${k}" style="color:${counterDiff != null && counterDiff >= 0 ? '#00b894' : '#d63031'}">${counterDiff != null ? (counterDiff >= 0 ? '+' : '') + counterDiff : '-'}</td>
        <td>
          <input type="number" class="price-input final" value="${fp}" step="10"
                 data-key="${k}" onchange="onFinalChange(this)"
                 oninput="onFinalChange(this)">
        </td>
        <td class="num" id="fd_${k}" style="color:${finalDiff != null && finalDiff >= 0 ? '#00b894' : '#d63031'}">${finalDiff != null ? (finalDiff >= 0 ? '+' : '') + finalDiff : '-'}</td>
      </tr>`;
    });

    // 캠프별 소계 행
    rows += buildSubtotalRows(camp, cid, group, false);
  });

  // 전체 합계 (2개 이상 캠프 선택 시)
  if (multiCamp && filtered.length > 0) {
    rows += buildSubtotalRows('전체', 'grand', filtered, true);
  }

  document.getElementById('tableWrap').innerHTML = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>라우트</th>
          <th>타입</th>
          <th>담당기사</th>
          <th>2024단가</th>
          <th class="neg">조정금액</th>
          <th class="neg">조정율</th>
          <th>2025단가</th>
          <th class="proposed">2026제안</th>
          <th class="proposed">25→제안</th>
          <th class="counter counter-col">협상단가</th>
          <th class="counter counter-col">25→협상</th>
          <th class="final">최종단가</th>
          <th class="final">25→최종</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>
  `;
  if (isFinalMode) { const tbl = document.querySelector('table'); if (tbl) tbl.classList.add('hide-counter'); }
}

function updateSubtotalCells(cid, items) {
  const n = items.length;
  if (n === 0) return;
  const sC = items.reduce((s,d) => s + (counterPrices[routeKey(d)] || 0), 0);
  const sF = items.reduce((s,d) => s + (finalPrices[routeKey(d)] || 0), 0);
  const s2025 = items.reduce((s,d) => s + (d.p2025 || 0), 0);
  const aC = Math.trunc(sC / n);
  const aF = Math.trunc(sF / n);
  const sCDsum = sC - s2025;
  const sFDsum = sF - s2025;
  const cdA = items.filter(d => d.p2025 != null).map(d => counterPrices[routeKey(d)] - d.p2025);
  const aCD = cdA.length ? Math.trunc(cdA.reduce((a,b)=>a+b,0)/cdA.length) : null;
  const fdA = items.filter(d => d.p2025 != null).map(d => finalPrices[routeKey(d)] - d.p2025);
  const aFD = fdA.length ? Math.trunc(fdA.reduce((a,b)=>a+b,0)/fdA.length) : null;

  const el = (id, val) => { const e = document.getElementById(id); if (e) e.textContent = val; };
  const elC = (id, val, color) => { const e = document.getElementById(id); if (e) { e.textContent = val; e.style.color = color; } };

  // 합계 행
  el('sub_'+cid+'_sC', fmt(sC));
  el('sub_'+cid+'_sF', fmt(sF));
  elC('sub_'+cid+'_sCDiff', fmtSign(sCDsum), sCDsum >= 0 ? '#00b894' : '#d63031');
  elC('sub_'+cid+'_sFDiff', fmtSign(sFDsum), sFDsum >= 0 ? '#00b894' : '#d63031');
  // 평균 행
  el('sub_'+cid+'_aC', fmt(aC));
  el('sub_'+cid+'_aF', fmt(aF));
  elC('sub_'+cid+'_aCD', aCD != null ? fmtSign(aCD) : '-', aCD != null && aCD >= 0 ? '#00b894' : '#d63031');
  elC('sub_'+cid+'_aFD', aFD != null ? fmtSign(aFD) : '-', aFD != null && aFD >= 0 ? '#00b894' : '#d63031');
}

function updateSubtotals() {
  const filtered = getFiltered();
  const campMap = {};
  const campGroups = [];
  filtered.forEach(d => {
    if (!campMap[d.camp]) { campMap[d.camp] = []; campGroups.push(d.camp); }
    campMap[d.camp].push(d);
  });
  campGroups.forEach(camp => updateSubtotalCells(campId(camp), campMap[camp]));
  if (selectedCamps.size > 1 && filtered.length > 0) {
    updateSubtotalCells('grand', filtered);
  }
}

function onCounterChange(input) {
  const key = input.dataset.key;
  const val = parseInt(input.value) || 0;
  counterPrices[key] = val;
  finalPrices[key] = val;
  const finalInput = document.querySelector(`input.final[data-key="${key}"]`);
  if (finalInput) finalInput.value = val;
  updateDiffs(key);
  renderSummary();
  updateSubtotals();
}

function onFinalChange(input) {
  const key = input.dataset.key;
  const val = parseInt(input.value) || 0;
  finalPrices[key] = val;
  updateDiffs(key);
  updateSubtotals();
}

function updateDiffs(key) {
  const d = DATA.find(x => routeKey(x) === key);
  if (!d || d.p2025 == null) return;

  const cp = counterPrices[key];
  const fp = finalPrices[key];
  const cdEl = document.getElementById('cd_' + key);
  const fdEl = document.getElementById('fd_' + key);

  if (cdEl) {
    const diff = cp - d.p2025;
    cdEl.textContent = (diff >= 0 ? '+' : '') + diff;
    cdEl.style.color = diff >= 0 ? '#00b894' : '#d63031';
  }
  if (fdEl) {
    const diff = fp - d.p2025;
    fdEl.textContent = (diff >= 0 ? '+' : '') + diff;
    fdEl.style.color = diff >= 0 ? '#00b894' : '#d63031';
  }
}

function stepCounter(key, delta) {
  counterPrices[key] = (counterPrices[key] || 0) + delta;
  finalPrices[key] = counterPrices[key];
  const input = document.querySelector(`input.price-input:not(.final)[data-key="${key}"]`);
  if (input) input.value = counterPrices[key];
  const finalInput = document.querySelector(`input.final[data-key="${key}"]`);
  if (finalInput) finalInput.value = counterPrices[key];
  updateDiffs(key);
  renderSummary();
  updateSubtotals();
}

function applyPreset(offset) {
  isFinalMode = false;
  counterOffset = offset;
  document.querySelectorAll('.preset-btn').forEach(btn => {
    if (btn.classList.contains('final-btn')) { btn.classList.remove('active'); return; }
    btn.classList.toggle('active', btn.textContent.includes('+' + offset) || (offset === 0 && btn.textContent.includes('그대로')));
  });

  DATA.forEach(d => {
    const key = routeKey(d);
    counterPrices[key] = d.p2026_proposed + offset;
    finalPrices[key] = counterPrices[key];
  });

  document.getElementById('presetInfo').textContent = offset === 0 ? '제안단가 그대로' : `제안단가 + ${offset}원`;
  renderTable();
  renderSummary();
}

function calcSubtotals(items) {
  const n = items.length;
  const s24 = items.reduce((s,d) => s + (d.p2024||0), 0);
  const s25 = items.reduce((s,d) => s + (d.p2025||0), 0);
  const sP = items.reduce((s,d) => s + (d.p2026_proposed||0), 0);
  const sC = items.reduce((s,d) => s + (counterPrices[routeKey(d)]||0), 0);
  const sF = items.reduce((s,d) => s + (finalPrices[routeKey(d)]||0), 0);
  const sAdj = s25 - s24;
  const sAdjP = s24 ? Math.trunc((s25-s24)/s24*1000)/10 : null;
  const sPD = sP - s25;
  const sCD = sC - s25;
  const sFD = sF - s25;
  const a24 = Math.trunc(s24/n);
  const a25 = Math.trunc(s25/n);
  const aP = Math.trunc(sP/n);
  const aC = Math.trunc(sC/n);
  const aF = Math.trunc(sF/n);
  const adjArr = items.filter(d=>d.adj_amount!=null).map(d=>d.adj_amount);
  const aAdj = adjArr.length ? Math.trunc(adjArr.reduce((a,b)=>a+b,0)/adjArr.length) : null;
  const adjPArr = items.filter(d=>d.adj_pct!=null).map(d=>d.adj_pct);
  const aAdjP = adjPArr.length ? Math.trunc(adjPArr.reduce((a,b)=>a+b,0)/adjPArr.length*10)/10 : null;
  const pdArr = items.filter(d=>d.prop_diff!=null).map(d=>d.prop_diff);
  const aPD = pdArr.length ? Math.trunc(pdArr.reduce((a,b)=>a+b,0)/pdArr.length) : null;
  const cdArr = items.filter(d=>d.p2025!=null).map(d=>counterPrices[routeKey(d)]-d.p2025);
  const aCD = cdArr.length ? Math.trunc(cdArr.reduce((a,b)=>a+b,0)/cdArr.length) : null;
  const fdArr = items.filter(d=>d.p2025!=null).map(d=>finalPrices[routeKey(d)]-d.p2025);
  const aFD = fdArr.length ? Math.trunc(fdArr.reduce((a,b)=>a+b,0)/fdArr.length) : null;
  return {n, s24, s25, sP, sC, sF, sAdj, sAdjP, sPD, sCD, sFD, a24, a25, aP, aC, aF, aAdj, aAdjP, aPD, aCD, aFD};
}

function downloadExcel() {
  const filtered = getFiltered();
  const multiCamp = selectedCamps.size > 1;
  const campGroups = [];
  const campMap = {};
  filtered.forEach(d => {
    if (!campMap[d.camp]) { campMap[d.camp] = []; campGroups.push(d.camp); }
    campMap[d.camp].push(d);
  });

  const aoa = [];
  aoa.push(["#", "캠프", "라우트", "타입", "담당기사", "2024단가", "조정금액", "조정율(%)", "2025단가", "2026제안", "25→제안", "협상단가", "25→협상", "최종단가", "25→최종"]);

  campGroups.forEach(camp => {
    const group = campMap[camp];
    let idx = 0;
    group.forEach(d => {
      const k = routeKey(d);
      const cp = counterPrices[k];
      const fp = finalPrices[k];
      idx++;
      const cd = d.p2025 != null ? cp - d.p2025 : null;
      const fd = d.p2025 != null ? fp - d.p2025 : null;
      aoa.push([idx, d.camp, d.route, d.type, d.driver || "",
        d.p2024, d.adj_amount, d.adj_pct, d.p2025,
        d.p2026_proposed, d.prop_diff, cp, cd, fp, fd]);
    });

    const t = calcSubtotals(group);
    aoa.push(["", camp+" 합계", "", "", t.n+"개", t.s24, t.sAdj, t.sAdjP, t.s25, t.sP, t.sPD, t.sC, t.sCD, t.sF, t.sFD]);
    aoa.push(["", camp+" 평균", "", "", "", t.a24, t.aAdj, t.aAdjP, t.a25, t.aP, t.aPD, t.aC, t.aCD, t.aF, t.aFD]);
    aoa.push([]);
  });

  if (filtered.length > 0) {
    const t = calcSubtotals(filtered);
    aoa.push(["", "전체 합계", "", "", t.n+"개", t.s24, t.sAdj, t.sAdjP, t.s25, t.sP, t.sPD, t.sC, t.sCD, t.sF, t.sFD]);
    aoa.push(["", "전체 평균", "", "", "", t.a24, t.aAdj, t.aAdjP, t.a25, t.aP, t.aPD, t.aC, t.aCD, t.aF, t.aFD]);
  }

  const ws = XLSX.utils.aoa_to_sheet(aoa);
  ws["!cols"] = [
    {wch:4}, {wch:12}, {wch:8}, {wch:5}, {wch:8},
    {wch:10}, {wch:10}, {wch:10}, {wch:10}, {wch:10},
    {wch:9}, {wch:10}, {wch:9}, {wch:10}, {wch:9}
  ];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "단가협상");
  const sel = selectedCamps.size === CAMP_ORDER.length ? "전체" : [...selectedCamps].join("_");
  XLSX.writeFile(wb, `2026_단가협상_${sel}.xlsx`);
}

function prepareCapture() {
  const wrap = document.getElementById('tableWrap');
  const body = document.body;
  const st = { ww: wrap.style.cssText, bw: body.style.cssText, items: [] };
  wrap.style.overflow = 'visible';
  wrap.style.flex = 'none';
  body.style.overflow = 'visible';
  body.style.height = 'auto';
  const table = wrap.querySelector('table');
  table.querySelectorAll('input.price-input').forEach(inp => {
    const span = document.createElement('span');
    span.textContent = Number(inp.value).toLocaleString();
    span.style.fontFamily = "'Consolas', monospace";
    span.style.fontSize = '13px';
    span.style.fontWeight = '600';
    const stepper = inp.parentNode.querySelector('.stepper');
    if (stepper) stepper.style.display = 'none';
    inp.style.display = 'none';
    inp.parentNode.insertBefore(span, inp);
    st.items.push({ inp, span, stepper });
  });
  return st;
}

function restoreCapture(st) {
  document.getElementById('tableWrap').style.cssText = st.ww;
  document.body.style.cssText = st.bw;
  st.items.forEach(item => {
    item.span.remove();
    item.inp.style.display = '';
    if (item.stepper) item.stepper.style.display = '';
  });
}

async function downloadImage() {
  const st = prepareCapture();
  const table = document.querySelector('#tableWrap table');
  const canvas = await html2canvas(table, { scale: 2, useCORS: true });
  restoreCapture(st);
  const link = document.createElement('a');
  const sel = selectedCamps.size === CAMP_ORDER.length ? '전체' : [...selectedCamps].join('_');
  link.download = `2026_단가협상_${sel}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}

async function downloadPDF() {
  const st = prepareCapture();
  const table = document.querySelector('#tableWrap table');
  const canvas = await html2canvas(table, { scale: 2, useCORS: true });
  restoreCapture(st);
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF('l', 'mm', 'a4');
  const pw = pdf.internal.pageSize.getWidth() - 20;
  const ph = pdf.internal.pageSize.getHeight() - 20;
  const ratio = pw / canvas.width;
  const imgH = canvas.height * ratio;
  const pages = Math.ceil(imgH / ph);
  for (let i = 0; i < pages; i++) {
    if (i > 0) pdf.addPage();
    const sy = i * (ph / ratio);
    const sh = Math.min(ph / ratio, canvas.height - sy);
    const pc = document.createElement('canvas');
    pc.width = canvas.width;
    pc.height = sh;
    pc.getContext('2d').drawImage(canvas, 0, sy, canvas.width, sh, 0, 0, canvas.width, sh);
    pdf.addImage(pc.toDataURL('image/png'), 'PNG', 10, 10, pw, sh * ratio);
  }
  const sel = selectedCamps.size === CAMP_ORDER.length ? '전체' : [...selectedCamps].join('_');
  pdf.save(`2026_단가협상_${sel}.pdf`);
}

function applyFinalNegotiated() {
  DATA.forEach(d => {
    const nk = d.camp + '_' + d.route;
    const neg = FINAL_NEGOTIATED[nk];
    if (neg) {
      counterPrices[routeKey(d)] = neg.counter;
      finalPrices[routeKey(d)] = neg.final;
    }
  });
  document.querySelectorAll('.preset-btn').forEach(btn => btn.classList.remove('active'));
  const fb = document.querySelector('.preset-btn.final-btn');
  if (fb) fb.classList.add('active');
  isFinalMode = true;
  document.getElementById('presetInfo').textContent = '최종 협상 결과 적용';
  renderTable();
  renderSummary();
}
