<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2026년 바로물류 휴무일정표</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
  }
  header {
    background: linear-gradient(135deg, #1a73e8, #0d47a1);
    color: #fff;
    padding: 28px 20px 24px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.15);
  }
  header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  header p {
    margin-top: 6px;
    font-size: 0.85rem;
    opacity: 0.85;
  }
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px 0 40px;
  }
  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 0.82rem;
    color: #555;
  }
  .info-bar a {
    color: #1a73e8;
    text-decoration: none;
    font-weight: 500;
  }
  .info-bar a:hover { text-decoration: underline; }
  .sheet-frame {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 1px 6px rgba(0,0,0,.08);
    overflow: hidden;
    position: relative;
  }
  .scale-wrapper {
    width: 100%;
  }
  .scale-wrapper > * {
    width: 100%;
    height: 2400px;
    border: none;
    display: block;
  }
  footer {
    text-align: center;
    padding: 24px 16px;
    font-size: 0.75rem;
    color: #999;
  }
</style>
</head>
<body>
  <header>
    <h1>2026년 바로물류 휴무일정표</h1>
    <p>바로물류 연간 휴무 일정 안내</p>
  </header>
  <div class="container">
    <div class="info-bar">
      <span>최종 업데이트: 스프레드시트 원본 기준 자동 반영</span>
      <a href="https://docs.google.com/spreadsheets/d/e/2PACX-1vSYHTVN1CxUIGdYUeSxOo5QHzsh2qJ_6mHcJLyGDEtnrl2akrItl-FChTcU6d5erck0CkA51etVQTwl/pubhtml" target="_blank" rel="noopener">
        원본 스프레드시트 열기 &rarr;
      </a>
    </div>
    <div class="sheet-frame" id="sheetFrame">
      <div class="scale-wrapper" id="scaleWrapper">
        <iframe
          id="sheetIframe"
          src="https://docs.google.com/spreadsheets/d/e/2PACX-1vSYHTVN1CxUIGdYUeSxOo5QHzsh2qJ_6mHcJLyGDEtnrl2akrItl-FChTcU6d5erck0CkA51etVQTwl/pubhtml?widget=true&headers=false"
        ></iframe>
      </div>
    </div>
  </div>
  <footer>
    &copy; 2026 바로물류
  </footer>
</body>
</html>
